# pgvector needs a Postgres with the `vector` extension. This bundles one
# (the official pgvector image) and runs the sample app against it.
#   docker compose up --build
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 15

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres
    depends_on:
      db:
        condition: service_healthy
    # The query word — try "rocket" to see the neighbours flip.
    command: ["cat"]
