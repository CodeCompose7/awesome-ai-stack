# Live editing — the workflow you'd otherwise open the devcontainer for:
#
#   docker compose -f docker-compose.dev.yml up
#
# then open http://localhost:4321/awesome-ai-stack/ . Your working tree is bind-
# mounted, so edits on the host hot-reload in the container. Same Dockerfile.dev
# image as the default compose, but source comes from the mount instead of the
# baked-in copy. For the zero-setup, view-only mode, use `docker compose up`.
services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '4321:4321'
    environment:
      # Non-interactive pnpm: the startup install below (and pnpm's own pre-run
      # dep check) must not stop at a TTY prompt to purge node_modules — that no-
      # TTY abort is exactly what breaks a naive `pnpm install` over a bind mount.
      CI: 'true'
    volumes:
      # Live source: edit on the host, the dev server reloads (Vite polls for
      # changes — set by the stack-site-builder theme — needed over a bind mount).
      - .:/app
      # Keep the image's installed node_modules; don't let the host mount
      # overlay it (the host may have none, or a different platform's binaries).
      # Seeded from the image on first `up`; persists until `down -v`.
      - /app/node_modules
      # The sample "run" wizard shells out to Docker (Docker-out-of-Docker) to
      # build and run the samples/ projects. Remove this line if you don't use
      # the wizard or aren't on Linux/macOS.
      - /var/run/docker.sock:/var/run/docker.sock
    # Reconcile deps with the bind-mounted lockfile (installs into the anonymous
    # node_modules volume above), then start the dev server. `exec` hands PID 1
    # to Astro so Ctrl-C stops it cleanly.
    command: sh -c "pnpm install && exec pnpm dev"
