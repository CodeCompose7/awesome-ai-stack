name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Rebuild daily so GitHub stars/versions (fetched at build time) stay fresh
  # even without code changes.
  schedule:
    - cron: '0 6 * * *'

# Allow GITHUB_TOKEN to deploy to Pages and verify the deployment origin
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build with Astro
        uses: withastro/action@56781b97402ce0487b7e61ce2cb960c0e2cc5289 # v3
        env:
          # Authenticate the build-time GitHub API calls (stars/version) to
          # lift the 60 req/hour unauthenticated rate limit.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          node-version: 24
          # Pinned to match package.json's packageManager field / the dev container.
          package-manager: pnpm@11.7.0
          # The Astro project lives in the workspace, not the repo root.
          path: ./sites/ai-stack

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
