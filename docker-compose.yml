# Clone and run — view the site with nothing installed but Docker:
#
#   docker compose up
#
# then open http://localhost:4321/awesome-ai-stack/ .
#
# Self-contained: deps and source are baked into the image (Dockerfile.dev), so
# this needs no files from your host and works on a fresh clone. It serves the
# Astro dev server — the production site is the static build from
# .github/workflows/deploy.yml, not this image.
#
# Editing content? Use docker-compose.dev.yml instead — it bind-mounts your
# working tree so edits hot-reload:
#
#   docker compose -f docker-compose.dev.yml up
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '4321:4321'
    environment:
      # Non-interactive: should pnpm's pre-run dependency check ever want to
      # touch node_modules, let it proceed instead of aborting at a TTY prompt.
      CI: 'true'
    volumes:
      # The sample "run" wizard shells out to Docker (Docker-out-of-Docker) to
      # build and run the samples/ projects from the local site UI; this mounts
      # the host daemon's socket so it can. Remove this line if you don't use the
      # wizard or aren't on Linux/macOS.
      - /var/run/docker.sock:/var/run/docker.sock
